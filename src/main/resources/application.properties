spring.application.name=virtualization-platform
server.port=8080

# H2 Configuration
spring.datasource.url=jdbc:h2:mem:virtualdb;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Logging
logging.level.com.virtualization=DEBUG

# Actuator & Metrics
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.metrics.export.prometheus.enabled=true
management.health.redis.enabled=false

# AI Configuration (Google Gemini)
ai.enabled=true
ai.provider=gemini
ai.api-key=AIzaSyCySJcZqmDsNg6k5XlMQ1eVRCHAJtrfhIY
ai.base-url=https://generativelanguage.googleapis.com/v1beta
ai.model=gemini-1.5-flash
ai.temperature=0.7
ai.max-tokens=2000
ai.timeout-seconds=30
