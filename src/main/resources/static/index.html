<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Antigravity | Virtualization Platform</title>
    <link rel="stylesheet" href="index.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fira+Code&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="dashboard-container">
        <header>
            <div class="logo-group">
                <div class="status-indicator status-online"></div>
                <h1>Virtu-AI ENGINE</h1>
            </div>
            <div class="header-actions">
                <button class="secondary" onclick="refreshData()">Refresh Data</button>
                <button onclick="openCreateModal()">+ Create Service</button>
            </div>
        </header>

        <div class="tabs"
            style="display:flex; gap:1rem; margin-bottom:2rem; border-bottom:1px solid var(--glass-border); padding-bottom:1rem;">
            <button id="tab-live" class="tab-btn active" style="background:var(--primary); color:white;"
                onclick="switchTab('live')">Live Services & Logs</button>
            <button id="tab-test" class="tab-btn"
                style="background:transparent; color:var(--text-muted); border:1px solid var(--glass-border);"
                onclick="switchTab('test')">Test Client</button>
        </div>

        <div id="pane-live">
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-label">Active Virtual Services</div>
                    <div class="stat-value" id="stat-services">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Active Mock Rules</div>
                    <div class="stat-value" id="stat-rules">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Total Traffic Recorded</div>
                    <div class="stat-value" id="stat-traffic">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">System Uptime</div>
                    <div class="stat-value">99.9%</div>
                </div>
            </div>

            <div class="main-content">
                <div class="card" style="grid-column: 1 / 2;">
                    <div class="card-header">
                        <h2 class="card-title">Virtual Services</h2>
                    </div>
                    <div id="service-list">
                        <!-- Services will be injected here -->
                    </div>
                </div>

                <div class="card">
                    <div class="card-header">
                    <div>
                        <h2 class="card-title">Live Traffic Logs</h2>
                        <div id="traffic-filter-label" style="font-size:0.85rem; color:var(--text-muted); margin-top:0.25rem;">Showing all traffic</div>
                    </div>
                    <div style="display:flex; gap:0.75rem; align-items:center;">
                        <button class="secondary" onclick="clearServiceSelection()" id="btn-clear-filter" style="display:none;">Clear Filter</button>
                        <button class="secondary" onclick="toggleRecording()" id="btn-recording">Start Recording</button>
                    </div>
                </div>
                    <table>
                        <thead>
                            <tr>
                                <th>Time</th>
                                <th>Method</th>
                                <th>Path</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody id="traffic-table-body">
                            <!-- Logs will be injected here -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div> <!-- End pane-live -->

        <!-- Test Client Pane -->
        <div id="pane-test" style="display:none;">
            <div class="card" style="margin-bottom:1.5rem;">
                <div class="card-header">
                    <h2 class="card-title">Test Client</h2>
                    <span style="font-size:0.75rem; color:var(--text-muted);">Select a service, pick an endpoint, and send test requests</span>
                </div>

                <!-- Service Selector Row -->
                <div style="display:flex; gap:1rem; margin-bottom:1rem; align-items:center;">
                    <label style="font-size:0.75rem; color:var(--text-muted); white-space:nowrap;">Service:</label>
                    <select id="test-service-select" onchange="onServiceSelect()"
                        style="flex:1; background:rgba(255,255,255,0.05); border:1px solid var(--glass-border); color:white; padding:0.5rem; border-radius:0.25rem; font-size:0.875rem;">
                        <option value="">-- Select a Service to Test --</option>
                    </select>
                </div>

                <!-- Endpoints for Selected Service -->
                <div id="test-endpoints-panel" style="display:none; margin-bottom:1rem; padding:0.75rem; background:rgba(255,255,255,0.03); border:1px solid var(--glass-border); border-radius:0.5rem;">
                    <label style="font-size:0.7rem; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.05em;">Available Endpoints (click to auto-fill)</label>
                    <div id="test-endpoints-list" style="margin-top:0.5rem; display:flex; flex-wrap:wrap; gap:0.5rem;"></div>
                </div>

                <!-- Method + Path + Send -->
                <div style="display:flex; gap:1rem; margin-bottom:1rem;">
                    <select id="test-method"
                        style="background:rgba(255,255,255,0.05); border:1px solid var(--glass-border); color:white; padding:0.5rem; border-radius:0.25rem;">
                        <option value="GET">GET</option>
                        <option value="POST">POST</option>
                        <option value="PUT">PUT</option>
                        <option value="DELETE">DELETE</option>
                    </select>
                    <input type="text" id="test-path" placeholder="/your-mock-endpoint"
                        style="flex:1; background:rgba(255,255,255,0.05); border:1px solid var(--glass-border); color:white; padding:0.5rem; border-radius:0.25rem;">
                    <button onclick="runTest()">Send</button>
                </div>

                <!-- Request / Response -->
                <div style="display:flex; gap:1rem;">
                    <div style="flex:1;">
                        <label style="font-size:0.75rem; color:var(--text-muted);">Request Body</label>
                        <textarea id="test-req-body" placeholder="{}"
                            style="width:100%; height:150px; background:rgba(255,255,255,0.05); border:1px solid var(--glass-border); color:white; padding:0.5rem; border-radius:0.25rem; font-family:'Fira Code',monospace; font-size:0.8rem;"></textarea>
                    </div>
                    <div style="flex:1;">
                        <label style="font-size:0.75rem; color:var(--text-muted);">Response <span id="test-status"
                                style="margin-left:1rem; font-weight:bold;"></span></label>
                        <textarea id="test-res-body" readonly placeholder="Response will appear here..."
                            style="width:100%; height:150px; background:rgba(0,0,0,0.2); border:1px solid var(--glass-border); color:var(--success); padding:0.5rem; border-radius:0.25rem; font-family:'Fira Code',monospace; font-size:0.8rem;"></textarea>
                    </div>
                </div>
            </div>
        </div> <!-- End pane-test -->
    </div>

    <!-- Unified Create Service Modal -->
    <div id="create-modal" class="modal"
        style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); backdrop-filter:blur(5px); z-index:1000; justify-content:center; align-items:center;">
        <div class="card" style="width:600px; padding:2rem; max-height: 90vh; overflow-y: auto;">
            <h2 class="card-title">Create New Service</h2>
            <div style="margin-top:1.5rem;">
                <label style="font-size:0.75rem; color:var(--text-muted);">Service Name (Required for Empty/ReqRes,
                    Optional for Swagger/JSON)</label>
                <input type="text" id="new-service-name" placeholder="e.g. Payments API"
                    style="width:100%; background:rgba(255,255,255,0.05); border:1px solid var(--glass-border); color:white; padding:0.75rem; border-radius:0.5rem; margin-bottom:1rem;">

                <label style="font-size:0.75rem; color:var(--text-muted);">Protocol Type</label>
                <select id="new-service-type"
                    style="width:100%; background:var(--bg-dark); border:1px solid var(--glass-border); color:white; padding:0.75rem; border-radius:0.5rem; margin-bottom:1.5rem;">
                    <option value="REST">REST / HTTP</option>
                    <option value="SOAP">SOAP / XML</option>
                    <option value="MQ">MQ / Async</option>
                </select>

                <label style="font-size:0.75rem; color:var(--text-muted);">Creation Method</label>
                <select id="creation-method" onchange="toggleCreationFields()"
                    style="width:100%; background:var(--bg-dark); border:1px solid var(--glass-border); color:white; padding:0.75rem; border-radius:0.5rem; margin-bottom:1.5rem;">
                    <option value="empty">Empty Service</option>
                    <option value="openapi">From OpenAPI / Swagger (YAML/JSON)</option>
                    <option value="json">From Bulk Rules (JSON Array)</option>
                    <option value="reqres">From Request / Response Pair</option>
                </select>

                <!-- Empty Service Fields (Now Empty) -->
                <div id="field-empty" class="creation-field">
                </div>

                <!-- OpenAPI / JSON Fields -->
                <div id="field-import" class="creation-field" style="display:none;">
                    <label style="font-size:0.75rem; color:var(--text-muted);">Select File OR Paste Content</label>
                    <input type="file" id="import-file" onchange="handleFileUpload(event)"
                        style="width:100%; margin-bottom:0.5rem; color:white; font-size:0.875rem;">
                    <textarea id="import-content" placeholder="Paste your Swagger/OpenAPI or JSON Rules here..."
                        style="width:100%; height:200px; background:rgba(255,255,255,0.05); border:1px solid var(--glass-border); color:white; padding:0.75rem; border-radius:0.5rem; margin-bottom:1.5rem; font-family:monospace;"></textarea>
                </div>

                <!-- Req / Res Fields -->
                <div id="field-reqres" class="creation-field" style="display:none;">
                    <label style="font-size:0.75rem; color:var(--text-muted);">Sample Request Body (Optional JSON
                        Matcher)</label>
                    <input type="file" id="req-file" onchange="handleReqFileUpload(event)"
                        style="width:100%; margin-bottom:0.5rem; color:white; font-size:0.875rem;"
                        accept=".json,.xml,.txt">
                    <textarea id="req-content" placeholder='{"id": 123}'
                        style="width:100%; height:100px; background:rgba(255,255,255,0.05); border:1px solid var(--glass-border); color:white; padding:0.75rem; border-radius:0.5rem; margin-bottom:1rem; font-family:monospace;"></textarea>

                    <label style="font-size:0.75rem; color:var(--text-muted);">Sample Response Body (What the mock will
                        return)</label>
                    <input type="file" id="res-file" onchange="handleResFileUpload(event)"
                        style="width:100%; margin-bottom:0.5rem; color:white; font-size:0.875rem;"
                        accept=".json,.xml,.txt">
                    <textarea id="res-content" placeholder='{"status": "success"}'
                        style="width:100%; height:100px; background:rgba(255,255,255,0.05); border:1px solid var(--glass-border); color:white; padding:0.75rem; border-radius:0.5rem; margin-bottom:1.5rem; font-family:monospace;"></textarea>
                </div>

                <div style="display:flex; gap:1rem; justify-content:flex-end;">
                    <button class="secondary" onclick="closeCreateModal()">Cancel</button>
                    <button onclick="submitCreation()">Create / Import</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_KEY = 'enterprise-secret';

        function switchTab(tabId) {
            document.getElementById('pane-live').style.display = tabId === 'live' ? 'block' : 'none';
            document.getElementById('pane-test').style.display = tabId === 'test' ? 'block' : 'none';

            const btnLive = document.getElementById('tab-live');
            const btnTest = document.getElementById('tab-test');

            if (tabId === 'live') {
                btnLive.style.background = 'var(--primary)';
                btnLive.style.color = 'white';
                btnLive.style.border = 'none';

                btnTest.style.background = 'transparent';
                btnTest.style.color = 'var(--text-muted)';
                btnTest.style.border = '1px solid var(--glass-border)';
            } else {
                btnTest.style.background = 'var(--primary)';
                btnTest.style.color = 'white';
                btnTest.style.border = 'none';

                btnLive.style.background = 'transparent';
                btnLive.style.color = 'var(--text-muted)';
                btnLive.style.border = '1px solid var(--glass-border)';
            }
        }

        async function fetchData(url) {
            const resp = await fetch(url, {
                headers: { 'X-API-KEY': API_KEY }
            });
            return resp.json();
        }

        // Global store for rules (used by test client)
        let _allRules = [];
        let _selectedServiceId = null;
        let _selectedServiceName = null;

        function formatServiceType(type) {
            if (!type) return 'Unknown';
            const value = type.toUpperCase();
            if (value === 'REST' || value === 'HTTP') return 'REST Webservice';
            if (value === 'MQ' || value === 'ASYNC') return 'MQ Service';
            if (value === 'SOAP') return 'SOAP Webservice';
            return type;
        }

        function selectService(id, name) {
            if (_selectedServiceId === id) {
                _selectedServiceId = null;
                _selectedServiceName = null;
            } else {
                _selectedServiceId = id;
                _selectedServiceName = name;
            }
            refreshData();
        }

        function clearServiceSelection() {
            _selectedServiceId = null;
            _selectedServiceName = null;
            refreshData();
        }

        async function refreshData() {
            try {
                const services = await fetchData('/api/admin/services');
                const rules = await fetchData('/api/admin/rules/http');
                const allLogs = await fetchData('/api/recorder/logs');
                const logs = _selectedServiceId ? await fetchData(`/api/recorder/logs?serviceId=${_selectedServiceId}`) : allLogs;

                _allRules = rules;

                document.getElementById('stat-services').innerText = services.length;
                document.getElementById('stat-rules').innerText = rules.length;
                document.getElementById('stat-traffic').innerText = allLogs.length;

                document.getElementById('traffic-filter-label').innerText = _selectedServiceId ? `Showing transactions for ${_selectedServiceName}` : 'Showing all traffic';
                document.getElementById('btn-clear-filter').style.display = _selectedServiceId ? 'inline-flex' : 'none';

                renderTraffic(logs);
                renderServices(services);

                // Update Test Client dropdown
                const select = document.getElementById('test-service-select');
                const currentVal = select.value;
                select.innerHTML = '<option value="">-- Select a Service to Test --</option>';
                services.forEach(s => {
                    const opt = document.createElement('option');
                    opt.value = s.id;
                    opt.textContent = `${s.name} (${formatServiceType(s.type)})`;
                    select.appendChild(opt);
                });
                if (currentVal) select.value = currentVal;

            } catch (e) {
                console.error("Failed to fetch dashboard data", e);
            }
        }

        function renderTraffic(logs) {
            const body = document.getElementById('traffic-table-body');
            body.innerHTML = logs.slice(-10).reverse().map(log => `
                <tr>
                    <td>${new Date(log.timestamp).toLocaleTimeString()}</td>
                    <td><span class="method-tag method-${log.method.toLowerCase()}">${log.method}</span></td>
                    <td class="log-path">${log.path}</td>
                    <td><span style="color: ${log.statusCode < 300 ? 'var(--success)' : 'var(--error)'}">${log.statusCode}</span></td>
                </tr>
            `).join('');
        }

        function renderServices(services) {
            const container = document.getElementById('service-list');
            container.innerHTML = services.map(s => {
                const activeClass = _selectedServiceId === s.id ? ' active-service' : '';
                return `
                <div class="service-card${activeClass}" onclick="selectService(${s.id}, '${s.name.replace(/'/g, "\\'")}')" title="Click to view ${s.name} traffic">
                    <div>
                        <div style="font-weight: 600; display:flex; align-items:center; gap:0.5rem;">
                            ${s.name}
                            <span style="font-size:0.65rem; padding:1px 4px; background:rgba(255,255,255,0.1); border-radius:4px;">${formatServiceType(s.type)}</span>
                        </div>
                        <div style="font-size: 0.75rem; color: var(--text-muted)">${s.enabled ? 'Active' : 'Disabled'}</div>
                    </div>
                    <div style="display:flex; gap:0.5rem; align-items:center;">
                        <button class="secondary" style="padding:4px 8px; font-size:0.75rem; border-color:var(--error); color:var(--error);" onclick="event.stopPropagation(); deleteService(${s.id})">Delete</button>
                        <div class="status-indicator ${s.enabled ? 'status-online' : ''}" style="margin: 0"></div>
                    </div>
                </div>
            `;
            }).join('');
        }

        async function deleteService(id) {
            if (!confirm("Are you sure you want to delete this service and all its rules?")) return;
            const resp = await fetch(`/api/admin/services/${id}`, {
                method: 'DELETE',
                headers: { 'X-API-KEY': API_KEY }
            });
            if (resp.ok) refreshData();
            else alert("Failed to delete service");
        }

        // Modal Logic
        function openCreateModal() {
            document.getElementById('create-modal').style.display = 'flex';
            toggleCreationFields();
        }

        function closeCreateModal() {
            document.getElementById('create-modal').style.display = 'none';
        }

        function toggleCreationFields() {
            const method = document.getElementById('creation-method').value;
            document.getElementById('field-empty').style.display = method === 'empty' ? 'block' : 'none';
            document.getElementById('field-import').style.display = (method === 'openapi' || method === 'json') ? 'block' : 'none';
            document.getElementById('field-reqres').style.display = method === 'reqres' ? 'block' : 'none';
        }

        function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                document.getElementById('import-content').value = e.target.result;
            };
            reader.readAsText(file);
        }

        function handleReqFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                document.getElementById('req-content').value = e.target.result;
            };
            reader.readAsText(file);
        }

        function handleResFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                document.getElementById('res-content').value = e.target.result;
            };
            reader.readAsText(file);
        }

        async function submitCreation() {
            const method = document.getElementById('creation-method').value;
            const name = document.getElementById('new-service-name').value;
            const type = document.getElementById('new-service-type').value;

            if (method === 'empty' || method === 'reqres') {
                if (!name) return alert("Service Name is required for this method.");
            }

            try {
                if (method === 'empty') {
                    const resp = await fetch('/api/admin/services', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'X-API-KEY': API_KEY },
                        body: JSON.stringify({ name, type, enabled: true })
                    });
                    if (!resp.ok) throw new Error("Failed to create empty service");

                } else if (method === 'openapi' || method === 'json') {
                    const content = document.getElementById('import-content').value;
                    if (!content) return alert("Please select a file or paste content to import.");

                    let endpoint = method === 'openapi' ? '/api/admin/import/openapi' : '/api/admin/import/json';
                    let payload = method === 'openapi' ? { spec: content, name, type } : { rules: JSON.parse(content), name: name || 'Bulk JSON Import', type };

                    const resp = await fetch(endpoint, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'X-API-KEY': API_KEY },
                        body: JSON.stringify(payload)
                    });
                    if (!resp.ok) throw new Error("Import failed. Make sure the JSON/YAML format is correct.");

                } else if (method === 'reqres') {
                    const reqContent = document.getElementById('req-content').value;
                    const resContent = document.getElementById('res-content').value;
                    if (!resContent) return alert("Response Body is required.");

                    const rule = {
                        name: "Auto-generated rule",
                        method: "POST",
                        pathPattern: ".*",
                        statusCode: 200,
                        responseBody: resContent,
                        priority: 1
                    };

                    if (reqContent) {
                        try {
                            const reqJson = JSON.parse(reqContent);
                            const keys = Object.keys(reqJson);
                            if (keys.length > 0) {
                                rule.jsonPathCondition = "$." + keys[0];
                                rule.jsonPathValue = reqJson[keys[0]];
                            }
                        } catch (e) {
                            console.warn("Req is not valid JSON, ignoring path matcher for now.");
                        }
                    }

                    const resp = await fetch('/api/admin/import/json', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'X-API-KEY': API_KEY },
                        body: JSON.stringify({ rules: [rule], name, type })
                    });
                    if (!resp.ok) throw new Error("Failed to create service from Req/Res pair");
                }

                alert("Successfully created service!");
                closeCreateModal();
                refreshData();
            } catch (e) {
                alert("Error: " + e.message);
                console.error(e);
            }
        }

        async function toggleRecording() {
            const btn = document.getElementById('btn-recording');
            if (btn.innerText === 'Start Recording') {
                const target = prompt("Enter target URL for recording (e.g. https://httpbin.org):");
                if (target) {
                    await fetch(`/api/recorder/start?targetUrl=${encodeURIComponent(target)}`, { method: 'POST' });
                    btn.innerText = 'Stop Recording';
                    btn.classList.remove('secondary');
                    btn.style.background = 'var(--error)';
                }
            } else {
                await fetch('/api/recorder/stop', { method: 'POST' });
                btn.innerText = 'Start Recording';
                btn.classList.add('secondary');
                btn.style.background = 'transparent';
            }
        }

        async function runTest() {
            const method = document.getElementById('test-method').value;
            let path = document.getElementById('test-path').value;
            const body = document.getElementById('test-req-body').value;

            if (!path) {
                alert('Please enter a path or select an endpoint from the list above.');
                return;
            }
            if (!path.startsWith('/')) path = '/' + path;

            const resBodyEl = document.getElementById('test-res-body');
            const statusEl = document.getElementById('test-status');

            resBodyEl.value = 'Sending...';
            statusEl.innerText = '';
            statusEl.style.color = 'var(--text-muted)';

            try {
                const options = {
                    method: method,
                    headers: {}
                };

                if (method !== 'GET' && method !== 'HEAD' && body) {
                    options.body = body;
                    options.headers['Content-Type'] = 'application/json';
                }

                const startTime = Date.now();
                const resp = await fetch(path, options);
                const timeTaken = Date.now() - startTime;

                const responseText = await resp.text();

                statusEl.innerText = `${resp.status} ${resp.statusText} (${timeTaken}ms)`;
                statusEl.style.color = resp.ok ? 'var(--success)' : 'var(--error)';

                try {
                    const json = JSON.parse(responseText);
                    resBodyEl.value = JSON.stringify(json, null, 2);
                } catch (e) {
                    resBodyEl.value = responseText;
                }

                refreshData();
            } catch (e) {
                statusEl.innerText = 'Error';
                statusEl.style.color = 'var(--error)';
                resBodyEl.value = e.message;
            }
        }

        // --- Test Client: Service selector logic ---
        function onServiceSelect() {
            const serviceId = document.getElementById('test-service-select').value;
            const panel = document.getElementById('test-endpoints-panel');
            const list = document.getElementById('test-endpoints-list');

            if (!serviceId) {
                panel.style.display = 'none';
                list.innerHTML = '';
                return;
            }

            // Filter rules that belong to this service
            const serviceRules = _allRules.filter(r => String(r.serviceId) === String(serviceId));

            if (serviceRules.length === 0) {
                panel.style.display = 'block';
                list.innerHTML = '<span style="font-size:0.8rem; color:var(--text-muted); font-style:italic;">No rules/endpoints configured for this service yet.</span>';
                return;
            }

            panel.style.display = 'block';
            list.innerHTML = serviceRules.map(rule => {
                const methodColor = {
                    'GET': '#61affe', 'POST': '#49cc90', 'PUT': '#fca130', 'DELETE': '#f93e3e'
                }[rule.method] || 'var(--text-muted)';
                // Convert regex path pattern to a readable path
                let displayPath = rule.pathPattern || '/';
                displayPath = displayPath.replace(/^\^/, '').replace(/\$$/, '').replace(/\[\^\/\]\+/g, '{id}').replace(/\.\*/g, '*');
                return `<button onclick="fillEndpoint('${rule.method}', '${displayPath.replace(/'/g, "\\'")}')"
                    style="display:inline-flex; align-items:center; gap:0.4rem; padding:0.35rem 0.75rem;
                           background:rgba(255,255,255,0.05); border:1px solid ${methodColor}40;
                           border-radius:0.25rem; cursor:pointer; transition:all 0.2s;"
                    onmouseover="this.style.background='${methodColor}20'" onmouseout="this.style.background='rgba(255,255,255,0.05)'">
                    <span style="font-size:0.65rem; font-weight:700; color:${methodColor}; font-family:'Fira Code',monospace;">${rule.method}</span>
                    <span style="font-size:0.8rem; color:white; font-family:'Fira Code',monospace;">${displayPath}</span>
                </button>`;
            }).join('');
        }

        function fillEndpoint(method, path) {
            document.getElementById('test-method').value = method;
            document.getElementById('test-path').value = path;
            // Subtle highlight animation on the path input
            const pathInput = document.getElementById('test-path');
            pathInput.style.borderColor = 'var(--primary)';
            setTimeout(() => { pathInput.style.borderColor = 'var(--glass-border)'; }, 800);
        }

        setInterval(refreshData, 3000);
        refreshData();
    </script>
</body>

</html>
