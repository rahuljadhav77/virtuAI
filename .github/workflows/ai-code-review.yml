name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: AI Code Review
        uses: anc95/ChatGPT-CodeReview@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          # You can also use Gemini or other models by changing the action
          # For Gemini, you can use: google/gemini-action (or similar)
          LANGUAGE: English
          MODEL: gpt-4 # or gemini-pro
          PROMPT: "Please review the following code changes for security, performance, and best practices. Suggest improvements where necessary."
