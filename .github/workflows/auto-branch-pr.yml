name: Auto Branch & PR Flow

on:
  workflow_dispatch:
    inputs:
      branch_name:
        description: 'Name of the new branch'
        required: true
        default: 'feature/new-updates'
      pr_title:
        description: 'Title of the Pull Request'
        required: true
        default: 'Automatic updates from workflow'
      auto_merge:
        description: 'Automatically merge if checks pass?'
        type: boolean
        default: false

jobs:
  create-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Create Branch
        run: |
          git checkout -b ${{ github.event.inputs.branch_name }}
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
      - name: Commit Changes
        run: |
          # Add any local changes if they exist
          git add .
          git commit -m "${{ github.event.inputs.pr_title }}" || echo "No changes to commit"
          git push origin ${{ github.event.inputs.branch_name }}

      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --title "${{ github.event.inputs.pr_title }}" \
            --body "This is an automatically generated PR from the Auto Branch & PR workflow." \
            --base main \
            --head ${{ github.event.inputs.branch_name }}

      - name: Auto-Merge
        if: ${{ github.event.inputs.auto_merge == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge --auto --merge "${{ github.event.inputs.branch_name }}"
